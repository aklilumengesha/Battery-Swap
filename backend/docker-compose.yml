version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: batteryswap_postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-batteryswap}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: batteryswap_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Django (Daphne ASGI) ────────────────────────────────────────────────────
  django:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: batteryswap_django
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: batteryswap.settings.development
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-batteryswap}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app                          # live code reload in development
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: batteryswap_celery_worker
    command: celery -A batteryswap worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: batteryswap.settings.development
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-batteryswap}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat ─────────────────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: batteryswap_celery_beat
    command: celery -A batteryswap beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: batteryswap.settings.development
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-batteryswap}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Flower (Celery monitoring UI) ───────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: batteryswap_flower
    command: celery -A batteryswap flower --port=5555
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: batteryswap.settings.development
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
  static_files:
  media_files:
